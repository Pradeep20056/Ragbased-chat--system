version: '3.8'

services:
  database:
    image: pgvector/pgvector:pg16
    container_name: tender_eval_db_v1
    environment:
      POSTGRES_DB: tender_eval
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5444:5432"
    volumes:
      - tender_eval_pgdata_v1:/var/lib/postgresql/data

volumes:
  tender_eval_pgdata_v1:
